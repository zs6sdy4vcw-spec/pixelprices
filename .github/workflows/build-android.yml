name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔢 Set versionCode in app.json BEFORE prebuild
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 20 ))
          echo "Setting versionCode to $VERSION_CODE"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('app.json versionCode:', app.expo.android.versionCode);
          "
          cat app.json | grep versionCode

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ✅ Verify versionCode in AndroidManifest
        run: |
          grep "versionCode" android/app/build.gradle || echo "checking..."
          grep -r "versionCode" android/app/src/main/AndroidManifest.xml || echo "not in manifest"

      - name: 🔑 Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          ls -la android/app/release.keystore

      - name: 🏗️ Build Release AAB (Play Store)
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 20 ))
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: pixelprices-aab-run${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: 🏗️ Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelprices-apk-run${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
